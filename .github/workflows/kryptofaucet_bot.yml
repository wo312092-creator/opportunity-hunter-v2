name: Kryptofaucet Auto-Bot

on:
  schedule:
    - cron: "0 */6 * * *"  # Every 6 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  claim:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install playwright
          playwright install --with-deps chromium
      - name: Run Kryptofaucet bot
        env:
          FAUCETPAY_EMAIL: ${{ secrets.FAUCETPAY_EMAIL }}
          LTC_WALLET: ${{ secrets.LTC_WALLET }}
          TRX_WALLET: ${{ secrets.TRX_WALLET }}
        run: python kryptofaucet_bot.py
